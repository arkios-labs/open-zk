[package]
name = "open-zk-build-risc0"
version = "0.1.0"
edition = "2021"
description = "RISC Zero guest ELF builder for open-zk"

[features]
default = []
# Enable to rebuild guest ELFs from source (requires rzup toolchain).
# Without this feature, pre-built ELFs are used from src/prebuilt.rs.
rebuild-guest = ["dep:risc0-build"]
# Use local cross-compilation instead of Docker (faster for development).
debug-guest-build = []

[build-dependencies]
risc0-build = { version = "3", optional = true }

# Guest crate paths (relative to this Cargo.toml).
# risc0-build reads this to discover guest programs.
[package.metadata.risc0]
methods = ["../../guests/range-ethereum/risc0"]
