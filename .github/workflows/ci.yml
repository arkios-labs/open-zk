name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  contracts:
    name: Solidity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
      - name: Install dependencies
        working-directory: contracts
        run: forge install foundry-rs/forge-std succinctlabs/sp1-contracts risc0/risc0-ethereum --no-git
      - working-directory: contracts
        run: forge test

  # ---------------------------------------------------------------------------
  # E2E tests — each zkVM backend runs in parallel on its own runner/devnet
  # ---------------------------------------------------------------------------
  e2e-sp1:
    name: E2E (SP1)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.0
      - uses: foundry-rs/foundry-toolchain@v1
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Cache SP1 ELF
        id: cache-sp1-elf
        uses: actions/cache@v4
        with:
          path: guests/range-ethereum/sp1/target/elf-compilation
          key: sp1-elf-${{ hashFiles('guests/range-ethereum/src/**', 'guests/range-ethereum/sp1/**', 'guests/range-ethereum/Cargo.toml', 'guest/**') }}

      - name: Install SP1 toolchain
        if: steps.cache-sp1-elf.outputs.cache-hit != 'true'
        run: |
          curl -L https://sp1.succinct.xyz | bash
          ~/.sp1/bin/sp1up -v 6.0.2
          ~/.sp1/bin/cargo-prove prove --version

      - name: Build SP1 guest ELF
        if: steps.cache-sp1-elf.outputs.cache-hit != 'true'
        run: |
          cd guests/range-ethereum/sp1 && ~/.sp1/bin/cargo-prove prove build --features sp1

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false

      - name: Start devnet
        run: |
          git clone --depth 1 --branch v1.9.1 --recursive \
            https://github.com/ethereum-optimism/optimism.git
          make -C optimism devnet-up

      - name: Wait for devnet
        run: |
          timeout 120 bash -c 'until curl -sf http://127.0.0.1:8545 \
            -X POST -H "Content-Type: application/json" \
            -d "{\"jsonrpc\":\"2.0\",\"method\":\"eth_blockNumber\",\"params\":[],\"id\":1}"; do
            sleep 2; done'
          timeout 120 bash -c 'until curl -sf http://127.0.0.1:9545 \
            -X POST -H "Content-Type: application/json" \
            -d "{\"jsonrpc\":\"2.0\",\"method\":\"eth_blockNumber\",\"params\":[],\"id\":1}"; do
            sleep 2; done'

      - name: Run SP1 E2E
        run: |
          SP1_PROVER=mock cargo test -p open-zk-host \
            --features "sp1,kona" --test range_ethereum_e2e \
            --release -- --ignored --nocapture

      - name: Stop devnet
        if: always()
        run: make -C optimism devnet-down || true

  e2e-risc0:
    name: E2E (RISC Zero)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: foundry-rs/foundry-toolchain@v1
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false

      - name: Cache RISC Zero ELF
        id: cache-risc0-elf
        uses: actions/cache@v4
        with:
          path: target/riscv-guest
          key: risc0-elf-${{ hashFiles('guests/range-ethereum/src/**', 'guests/range-ethereum/risc0/**', 'guests/range-ethereum/Cargo.toml', 'guest/**', 'build/risc0/**') }}

      - name: Install RISC Zero toolchain
        if: steps.cache-risc0-elf.outputs.cache-hit != 'true'
        run: |
          curl -L https://risczero.com/install | bash
          ~/.risc0/bin/rzup install

      - name: Build RISC Zero guest ELF
        if: steps.cache-risc0-elf.outputs.cache-hit != 'true'
        run: |
          export PATH="$HOME/.risc0/bin:$PATH"
          cargo build -p open-zk-build-risc0 --features rebuild-guest,debug-guest-build --release

      - name: Start devnet
        run: |
          git clone --depth 1 --branch v1.9.1 --recursive \
            https://github.com/ethereum-optimism/optimism.git
          make -C optimism devnet-up

      - name: Wait for devnet
        run: |
          timeout 120 bash -c 'until curl -sf http://127.0.0.1:8545 \
            -X POST -H "Content-Type: application/json" \
            -d "{\"jsonrpc\":\"2.0\",\"method\":\"eth_blockNumber\",\"params\":[],\"id\":1}"; do
            sleep 2; done'
          timeout 120 bash -c 'until curl -sf http://127.0.0.1:9545 \
            -X POST -H "Content-Type: application/json" \
            -d "{\"jsonrpc\":\"2.0\",\"method\":\"eth_blockNumber\",\"params\":[],\"id\":1}"; do
            sleep 2; done'

      - name: Run RISC Zero E2E
        run: |
          RISC0_DEV_MODE=1 cargo test -p open-zk-host \
            --features "rebuild-risc0-guest,kona" --test range_ethereum_e2e \
            --release -- --ignored --nocapture

      - name: Stop devnet
        if: always()
        run: make -C optimism devnet-down || true
